name: Development Deployment Pipeline

on:
  push:
    tags:
      - 'v*-alpha'

jobs:
  validate-alpha-release:
    name: Validate Alpha Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag format
        run: |
          echo "Release tag: ${{ github.ref_name }}"

          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha$ ]]; then
            echo "Release tag must follow format: v0.0.0-alpha"
            exit 1
          fi

          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          DEV_HEAD=$(git rev-parse origin/dev)

          echo "Tag commit SHA: $TAG_COMMIT"
          echo "Dev branch HEAD SHA: $DEV_HEAD"

          if [[ "$TAG_COMMIT" != "$DEV_HEAD" ]]; then
            echo "Release tag must match the latest commit from dev branch"
            exit 1
          fi

          echo "Validated release tag from dev branch HEAD"

  generate-changelog:
    name: Generate Release Changelog
    needs: validate-alpha-release
    uses: ./.github/workflows/changelog.yml

  deploy-development:
    name: Deploy Development Environment
    needs:
      - validate-alpha-release
      - generate-changelog
    uses: ./.github/workflows/deploy.yml
    with:
      environment: Development