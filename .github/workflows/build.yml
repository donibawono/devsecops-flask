name: Build Container Image

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

      version:
        required: true
        type: string

jobs:
  build-container-image:
    name: Build and Push Container Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image metadata
        id: metadata
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/devsecops-flask"
          VERSION="${{ inputs.version }}"
          ENVIRONMENT="${{ inputs.environment }}"

          if [[ "$ENVIRONMENT" == "Development" ]]; then
            LATEST_TAG="dev-latest"

          elif [[ "$ENVIRONMENT" == "Staging" ]]; then
            LATEST_TAG="stg-latest"

          elif [[ "$ENVIRONMENT" == "Production" ]]; then
            LATEST_TAG="latest"

          else
            echo "Unsupported environment"
            exit 1
          fi

          IMAGE_TAG="$VERSION"

          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.metadata.outputs.image_name }}:${{ steps.metadata.outputs.image_tag }} \
            --tag ${{ steps.metadata.outputs.image_name }}:${{ steps.metadata.outputs.latest_tag }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.metadata.outputs.image_name }}:${{ steps.metadata.outputs.image_tag }}
          docker push ${{ steps.metadata.outputs.image_name }}:latest

      - name: Display image information
        run: |
          echo "Container image pushed successfully"
          echo "Image: ${{ steps.metadata.outputs.image_name }}"
          echo "Tag: ${{ steps.metadata.outputs.image_tag }}"
          echo "Latest: latest"