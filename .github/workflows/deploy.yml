name: Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

      environment_url:
        required: true
        type: string

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment_url }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Show Environment
        run: |
          echo "Deploying to ${{ inputs.environment }}"
          echo "Environment URL: ${{ inputs.environment_url }}"
          echo "Docker Image: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-flask"
          echo "Docker Tag: ${{ github.ref_name }}"

      - name: Deploy Application
        run: |
          echo "Deploy process started"